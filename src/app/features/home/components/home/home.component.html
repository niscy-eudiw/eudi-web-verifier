<vc-wallet-layout>
  <div body class="container ">
    <h4>Define your presentation request</h4>
    <p>
      Follow the steps to specify what will be requested from the wallet to present.
    </p>
    <mat-stepper orientation="vertical" linear="true" #stepper>
      <form [formGroup]="formGroup">

        <mat-step [stepControl]="formGroup">
          <div style="padding: 2px">
            <ng-template matStepLabel>Presentation scenario</ng-template>
            <mat-form-field>
              <mat-label>Select</mat-label>
              <mat-select [(value)]="selected" formControlName="selectAttestationCtrl">
                <mat-option [value]="optionsPIDAuthentication">PID authentication</mat-option>
                <mat-option [value]="optionsMDLAuthentication">mDL authentication</mat-option>
                <mat-option [value]="optionsAgeVerification">Age verification</mat-option>
                <mat-option [value]="optionsCustomRequest">Custom request</mat-option>
              </mat-select>
              <mat-error>Select authenticate by</mat-error>
            </mat-form-field>
          </div>
          <div>
            <button mat-button matStepperNext>Next</button>
          </div>
        </mat-step>

        <mat-step [stepControl]="formGroup" label="What wallet must share">
          <div style="padding: 2px">
            <vc-radio-group [options]="selected" (choseEvent)="setNavigateTarget($event)"></vc-radio-group>
            <div>
              <button mat-button matStepperPrevious>Back</button>
              <button mat-button matStepperNext>Next</button>
            </div>
          </div>
        </mat-step>

        <mat-step [stepControl]="formGroup" label="Attestation format">
          <div style="padding: 2px">
            <mat-checkbox>mso-mdoc</mat-checkbox>
            <mat-checkbox [disabled]="true">sd-jwt-vc</mat-checkbox>
          </div>
          <div>
            <button mat-button matStepperNext (click)="submit()">Next</button>
          </div>
        </mat-step>

      </form>
    </mat-stepper>

  </div>
</vc-wallet-layout>
